<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>華山劍陣 Prototype</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <section class="top-hud">
        <div class="fighter-panel player-panel">
          <div class="name-row">
            <span class="name">華山弟子</span>
            <span id="playerHpText">500 / 500</span>
          </div>
          <div class="bar hp-bar"><span id="playerHpBar"></span></div>
        </div>

        <div class="round-panel">
          <span>移動點數</span>
          <strong id="paceText">半即時</strong>
          <div class="move-counter">
            <b id="moveStepsText">0</b>
            <span>目前可移動步數</span>
          </div>
        </div>

        <div class="fighter-panel enemy-panel">
          <div class="name-row">
            <span class="name">演武敵手</span>
            <span id="enemyHpText">200 / 200</span>
          </div>
          <div class="bar hp-bar enemy"><span id="enemyHpBar"></span></div>
          <div class="name-row guard-row">
            <span>堅韌</span>
            <span id="enemyGuardText">100 / 100</span>
          </div>
          <div class="bar guard-bar"><span id="enemyGuardBar"></span></div>
        </div>
      </section>

      <section class="arena-wrap">
        <div class="backdrop">
          <div class="mountain m1"></div>
          <div class="mountain m2"></div>
          <div class="mountain m3"></div>
          <div class="cloud c1"></div>
          <div class="cloud c2"></div>
        </div>
        <div id="board" class="board" aria-label="4 by 8 battle grid"></div>
        <div id="unitLayer" class="unit-layer" aria-hidden="true"></div>
        <div id="battleLog" class="battle-log">
          <strong>拖曳卡牌到棋盤施展</strong>
          <span>右鍵或雙擊卡牌兌換移動步數</span>
          <span id="teleportHint"></span>
        </div>
      </section>

      <div class="resource-orbs" aria-label="玩家資源">
        <div id="woundOrb" class="resource-orb wound-orb">
          <b id="woundOrbText">0</b>
          <span>傷</span>
        </div>
        <div id="swiftOrb" class="resource-orb swift-orb">
          <b id="swiftOrbText">0</b>
          <span>訊</span>
        </div>
      </div>

      <div class="resource-orb-hitboxes" aria-hidden="true">
        <button id="woundOrbHitbox" class="resource-orb-hitbox wound-hitbox" type="button" tabindex="-1"></button>
        <button id="swiftOrbHitbox" class="resource-orb-hitbox swift-hitbox" type="button" tabindex="-1"></button>
      </div>

      <section class="timeline-wrap" aria-label="抽牌進度">
        <span>抽牌</span>
        <div class="timeline-bar"><span id="drawProgressBar"></span></div>
        <b id="drawCountdownText">5.0s</b>
      </section>

      <section class="hand-zone">
        <div id="hand" class="hand"></div>
      </section>

      <div class="test-buttons">
        <button id="restartBtn" type="button">Restart</button>
        <button id="redrawBtn" type="button">Redraw</button>
      </div>

      <div id="resultOverlay" class="result-overlay hidden">
        <div>
          <h1 id="resultTitle">勝利</h1>
          <button id="overlayRestartBtn" type="button">再戰一局</button>
        </div>
      </div>
    </main>

    <script src="game.js"></script>
  </body>
</html>
